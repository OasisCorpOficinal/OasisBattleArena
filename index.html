<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OASIS - System V27</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* =========================================
           DESIGN SYSTEM: NEON TACTICAL V27
           ========================================= */
        :root {
            --bg: #00050a; 
            --panel: rgba(5, 15, 25, 0.95);
            --cyan: #00f3ff; --cyan-dim: rgba(0, 243, 255, 0.1);
            --yellow: #ffd700; --yellow-dim: rgba(255, 215, 0, 0.1);
            --danger: #ff2a2a; --danger-dim: rgba(255, 42, 42, 0.1);
            --green: #00ff00; --orange: #ff5e00; --magenta: #ff00ff;
            --text: #e0faff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Courier New', monospace; }
        
        body { 
            background-color: var(--bg); color: var(--text); 
            width: 100vw; height: 100vh; overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; position: relative; }
        .screen.active { display: flex; animation: fadeEntry 0.5s ease-out; }
        @keyframes fadeEntry { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* UI ELEMENTS */
        .neon-card { border: 1px solid var(--cyan); background: var(--cyan-dim); padding: 15px; border-radius: 6px; margin-bottom: 15px; box-shadow: 0 0 15px rgba(0, 243, 255, 0.05); position: relative; }
        h2 { font-size: 1.5rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; color: #fff; text-shadow: 0 0 5px var(--cyan); }
        h3 { font-size: 1rem; color: #888; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
        h4 { color: var(--yellow); font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
        
        select, input, textarea { background: rgba(0,0,0,0.6); border: 1px solid #444; color: var(--cyan); padding: 8px; width: 100%; text-align: center; font-size: 0.9rem; margin-bottom: 5px; border-radius: 4px; outline: none; font-family: monospace; }
        input:focus, textarea:focus { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan-dim); }

        .btn-action { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 12px; width: 100%; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; letter-spacing: 1px; margin-top: 5px; }
        .btn-action:active { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }
        .btn-link { background: rgba(255, 0, 255, 0.1); border: 1px solid var(--magenta); color: var(--magenta); margin-bottom: 20px; }
        .btn-store { background: rgba(0, 255, 0, 0.1); border: 1px solid var(--green); color: var(--green); margin-bottom: 15px; }
        .btn-bestiary { background: rgba(255, 0, 255, 0.1); border: 1px solid var(--magenta); color: var(--magenta); font-size: 0.8rem; padding: 10px; margin-bottom: 10px; }

        .bar-container { background: #111; height: 20px; width: 100%; border-radius: 4px; border: 1px solid #333; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #000; font-weight: 800; transition: width 0.5s ease; }
        .fill-cyan { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        .fill-yellow { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
        .big-number { font-size: 2.5rem; font-weight: 900; margin: 5px 0; text-shadow: 0 0 15px currentColor; }

        .center-frame { margin: auto; width: 90%; max-width: 400px; padding: 40px 20px; border: 2px solid var(--magenta); background: rgba(10, 5, 10, 0.9); text-align: center; border-radius: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .dual-panel-container { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
        .panel-box { border: 1px solid #333; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 6px; }
        .text-content { font-family: monospace; font-size: 0.8rem; line-height: 1.4; white-space: pre-wrap; color: #ccc; text-align: left; }
        .master-global-section { background: #1a1a1a; padding: 15px; border-bottom: 4px solid var(--yellow); margin-bottom: 20px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #333; }
        .btn-mini { padding: 5px 10px; font-size: 0.7rem; border: 1px solid #555; background: #222; color: #fff; cursor: pointer; margin-left: 5px; }
        .btn-mini.del { border-color: var(--danger); color: var(--danger); }

        /* COMBATE & HORDA */
        .combat-tabs { display: flex; border-bottom: 2px solid #333; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #111; color: #666; border: none; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--orange-dim); color: var(--orange); border-bottom: 2px solid var(--orange); }
        .combat-content { display: none; }
        .combat-content.active { display: block; animation: fadeEntry 0.3s; }
        .combat-card { border: 2px solid var(--orange); background: rgba(255, 94, 0, 0.05); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .combat-input { border-color: var(--orange); color: var(--orange); background: #110; }
        .hp-control { display: flex; gap: 10px; align-items: center; justify-content: center; margin: 15px 0; }
        .btn-hp { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--orange); background: #220; color: var(--orange); font-size: 1.5rem; cursor: pointer; font-weight: bold; }
        .current-hp { font-size: 3rem; font-weight: 900; color: var(--orange); text-shadow: 0 0 20px var(--orange); width: 100px; text-align: center; }
        
        .horde-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; max-height: 450px; overflow-y:
